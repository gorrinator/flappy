<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Bird</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Arial', sans-serif;
        }

        .game-container {
            position: relative;
            text-align: center;
        }

        canvas {
            border: 4px solid #fff;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .score-display {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 48px;
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            z-index: 10;
        }

        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.8);
            padding: 30px 50px;
            border-radius: 15px;
            color: white;
            display: none;
            z-index: 20;
        }

        .game-over h2 {
            font-size: 36px;
            margin-bottom: 15px;
        }

        .game-over p {
            font-size: 24px;
            margin-bottom: 20px;
        }

        .game-over button {
            padding: 12px 30px;
            font-size: 18px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .game-over button:hover {
            background: #45a049;
        }

        .instructions {
            margin-top: 15px;
            color: white;
            font-size: 14px;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="score-display" id="scoreDisplay">0</div>
        <canvas id="gameCanvas" width="400" height="600"></canvas>
        <div class="game-over" id="gameOver">
            <h2>Game Over!</h2>
            <p>Score: <span id="finalScore">0</span></p>
            <button onclick="restartGame()">Play Again</button>
        </div>
        <p class="instructions">Press SPACE or click to flap</p>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const gameOverDiv = document.getElementById('gameOver');
        const finalScoreSpan = document.getElementById('finalScore');

        // Game variables
        let bird = {
            x: 80,
            y: 300,
            width: 40,
            height: 30,
            velocity: 0,
            gravity: 0.05,
            jumpStrength: -2.5
        };

        let pipes = [];
        let pipeWidth = 60;
        let pipeGap = 180;
        let pipeSpeed = 2;
        let score = 0;
        let gameRunning = true;
        let gameStarted = false;
        let frameCount = 0;

        // Draw bird
        function drawBird() {
            const centerX = bird.x + bird.width/2;
            const centerY = bird.y + bird.height/2;
            
            // Wing (behind body)
            ctx.fillStyle = '#DAA520';
            ctx.beginPath();
            ctx.ellipse(centerX - 5, centerY + 5, 12, 8, -0.3, 0, Math.PI * 2);
            ctx.fill();
            
            // Body with gradient
            const bodyGradient = ctx.createRadialGradient(centerX - 5, centerY - 5, 5, centerX, centerY, 20);
            bodyGradient.addColorStop(0, '#FFE135');
            bodyGradient.addColorStop(0.7, '#FFD700');
            bodyGradient.addColorStop(1, '#FFA500');
            ctx.fillStyle = bodyGradient;
            ctx.beginPath();
            ctx.ellipse(centerX, centerY, bird.width/2, bird.height/2, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Belly highlight
            ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
            ctx.beginPath();
            ctx.ellipse(centerX - 3, centerY + 3, 10, 6, 0.2, 0, Math.PI * 2);
            ctx.fill();
            
            // Eye white
            ctx.fillStyle = '#FFF';
            ctx.beginPath();
            ctx.arc(centerX + 12, centerY - 5, 9, 0, Math.PI * 2);
            ctx.fill();
            
            // Eye outline
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(centerX + 12, centerY - 5, 9, 0, Math.PI * 2);
            ctx.stroke();
            
            // Pupil
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(centerX + 14, centerY - 5, 4, 0, Math.PI * 2);
            ctx.fill();
            
            // Eye shine
            ctx.fillStyle = '#FFF';
            ctx.beginPath();
            ctx.arc(centerX + 15, centerY - 7, 2, 0, Math.PI * 2);
            ctx.fill();
            
            // Beak
            ctx.fillStyle = '#FF6347';
            ctx.beginPath();
            ctx.moveTo(centerX + 18, centerY + 2);
            ctx.lineTo(centerX + 32, centerY + 5);
            ctx.lineTo(centerX + 18, centerY + 10);
            ctx.closePath();
            ctx.fill();
            
            // Beak highlight
            ctx.fillStyle = '#FF8C69';
            ctx.beginPath();
            ctx.moveTo(centerX + 20, centerY + 4);
            ctx.lineTo(centerX + 28, centerY + 5);
            ctx.lineTo(centerX + 20, centerY + 6);
            ctx.closePath();
            ctx.fill();
            
            // Head highlight
            ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.beginPath();
            ctx.arc(centerX - 5, centerY - 8, 6, 0, Math.PI * 2);
            ctx.fill();
            
            // Get ready message
            if (!gameStarted && gameRunning) {
                ctx.fillStyle = '#FFF';
                ctx.font = 'bold 28px Arial';
                ctx.textAlign = 'center';
                ctx.shadowColor = 'rgba(0, 0, 0, 0.5)';
                ctx.shadowBlur = 4;
                ctx.fillText('Get Ready!', canvas.width / 2, bird.y - 50);
                ctx.font = '18px Arial';
                ctx.fillText('Press SPACE or Click to Start', canvas.width / 2, bird.y - 25);
                ctx.shadowBlur = 0;
            }
        }

        // Create pipe
        function createPipe() {
            const minHeight = 80;
            const maxHeight = canvas.height - pipeGap - minHeight;
            const topHeight = Math.random() * (maxHeight - minHeight) + minHeight;
            
            pipes.push({
                x: canvas.width,
                topHeight: topHeight,
                bottomY: topHeight + pipeGap,
                passed: false
            });
        }

        // Draw pipes
        function drawPipes() {
            pipes.forEach(pipe => {
                // Top pipe
                ctx.fillStyle = '#2E8B57';
                ctx.fillRect(pipe.x, 0, pipeWidth, pipe.topHeight);
                
                // Pipe cap
                ctx.fillStyle = '#3CB371';
                ctx.fillRect(pipe.x - 5, pipe.topHeight - 20, pipeWidth + 10, 20);
                
                // Bottom pipe
                ctx.fillStyle = '#2E8B57';
                ctx.fillRect(pipe.x, pipe.bottomY, pipeWidth, canvas.height - pipe.bottomY);
                
                // Pipe cap
                ctx.fillStyle = '#3CB371';
                ctx.fillRect(pipe.x - 5, pipe.bottomY, pipeWidth + 10, 20);
            });
        }

        // Update pipes
        function updatePipes() {
            pipes.forEach((pipe, index) => {
                pipe.x -= pipeSpeed;
                
                // Check if bird passed pipe
                if (!pipe.passed && pipe.x + pipeWidth < bird.x) {
                    pipe.passed = true;
                    score++;
                    scoreDisplay.textContent = score;
                }
                
                // Remove off-screen pipes
                if (pipe.x + pipeWidth < 0) {
                    pipes.splice(index, 1);
                }
            });
        }

        // Check collision
        function checkCollision() {
            // Ground and ceiling collision
            if (bird.y < 0 || bird.y + bird.height > canvas.height) {
                return true;
            }
            
            // Pipe collision
            for (let pipe of pipes) {
                if (bird.x + bird.width > pipe.x && bird.x < pipe.x + pipeWidth) {
                    if (bird.y < pipe.topHeight || bird.y + bird.height > pipe.bottomY) {
                        return true;
                    }
                }
            }
            
            return false;
        }

        // Update bird
        function updateBird() {
            if (!gameStarted) return;
            bird.velocity += bird.gravity;
            bird.y += bird.velocity;
        }

        // Flap
        function flap() {
            if (gameRunning) {
                if (!gameStarted) {
                    gameStarted = true;
                }
                bird.velocity = bird.jumpStrength;
            }
        }

        // Game loop
        function gameLoop() {
            if (!gameRunning) return;
            
            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Background
            ctx.fillStyle = '#87CEEB';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Clouds
            ctx.fillStyle = '#FFF';
            ctx.beginPath();
            ctx.arc(100, 100, 30, 0, Math.PI * 2);
            ctx.arc(140, 100, 40, 0, Math.PI * 2);
            ctx.arc(180, 100, 30, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.beginPath();
            ctx.arc(280, 150, 25, 0, Math.PI * 2);
            ctx.arc(310, 150, 35, 0, Math.PI * 2);
            ctx.arc(340, 150, 25, 0, Math.PI * 2);
            ctx.fill();
            
            // Update and draw
            updateBird();
            drawBird();
            updatePipes();
            drawPipes();
            
            // Create new pipes
            frameCount++;
            if (frameCount % 100 === 0) {
                createPipe();
            }
            
            // Check collision
            if (checkCollision()) {
                gameOver();
            }
            
            requestAnimationFrame(gameLoop);
        }

        // Game over
        function gameOver() {
            gameRunning = false;
            finalScoreSpan.textContent = score;
            gameOverDiv.style.display = 'block';
        }

        // Restart game
        function restartGame() {
            bird.y = 300;
            bird.velocity = 0;
            pipes = [];
            score = 0;
            frameCount = 0;
            gameStarted = false;
            scoreDisplay.textContent = '0';
            gameOverDiv.style.display = 'none';
            gameRunning = true;
            gameLoop();
        }

        // Event listeners
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                flap();
            }
        });

        canvas.addEventListener('click', flap);
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            flap();
        });

        // Start game
        gameLoop();
    </script>
</body>
</html>
